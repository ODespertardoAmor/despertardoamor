<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - D/Amor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body{ background:#0f172a; height:100vh; display:flex; flex-direction:column; }
        .navbar{ width:100%; background:#111827; padding:18px 8%; display:flex; justify-content:space-between; align-items:center; color:white; border-bottom:2px solid #38bdf8; }
        .logo{ font-size:30px; font-weight:700; color:#38bdf8; }
        .back{ text-decoration:none; color:white; background:#2563eb; padding:10px 18px; border-radius:12px; transition:0.3s; }
        .back:hover{ background:#1d4ed8; }
        .chat-container{ flex:1; width:100%; max-width:1100px; margin:auto; display:flex; flex-direction:column; padding:20px; }
        .chat-box{ flex:1; background:#111827; border-radius:24px; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:20px; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
        
        .message{ max-width:75%; padding:16px 20px; border-radius:20px; word-wrap:break-word; font-size:15px; line-height:1.6; position: relative; }
        .message img{ width:220px; max-width:100%; border-radius:15px; margin-top:10px; }
        .message audio { max-width: 100%; margin-top: 5px; display: block; }

        .me{ align-self:flex-end; background:#2563eb; color:white; border-bottom-right-radius:5px; }
        .other{ align-self:flex-start; background:#1e293b; color:white; border-bottom-left-radius:5px; border:1px solid #334155; }
        .delete-btn{ display:block; margin-top:10px; color:white; font-size:12px; text-decoration:none; opacity:0.8; }
        .delete-btn:hover{ opacity:1; }

        .once-badge {
            font-size: 11px;
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-area{ margin-top:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .msg-input{ flex:1; min-width:200px; padding:18px; border:none; outline:none; border-radius:16px; background:#111827; color:white; font-size:16px; }
        .msg-input::placeholder{ color:#94a3b8; }
        .file-input{ background:#111827; color:white; padding:14px; border-radius:14px; border:1px solid #334155; }
        
        .send-btn{ background:#2563eb; color:white; border:none; padding:18px 30px; border-radius:16px; cursor:pointer; font-size:16px; font-weight:600; transition:0.3s; }
        .send-btn:hover{ background:#1d4ed8; }
        .send-btn:disabled{ background:#475569; cursor:not-allowed; }

        .audio-btn { background: #10b981; color: white; border: none; padding: 18px; border-radius: 16px; cursor: pointer; font-size: 18px; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 58px; height: 58px; }
        .audio-btn:hover { background: #059669; }
        .audio-btn.recording { background: #ef4444; animation: pulse 1.5s infinite; }

        .view-once-btn {
            background: #334155;
            color: #94a3b8;
            border: none;
            padding: 18px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            width: 58px;
            height: 58px;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .view-once-btn.active {
            background: #e11d48;
            color: white;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .empty{ color:#94a3b8; text-align:center; margin-top:40px; }

        @media(max-width:768px){
            .form-area{ flex-direction:column; align-items:stretch; }
            .send-btn, .audio-btn, .view-once-btn, .msg-input, .file-input{ width:100%; }
            .audio-btn, .view-once-btn { height: 54px; }
        }
        
        .msg-row{ display:flex; align-items:flex-end; gap:10px; margin: 8px 0; }
        .me-row{ justify-content:flex-end; }
        .other-row{ justify-content:flex-start; }
        .avatar-chat{ width:45px; height:45px; border-radius:50%; object-fit:cover; border:2px solid #38bdf8; flex-shrink: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">💙 D/Amor</div>
        <a href="/matches" class="back">Voltar</a>
    </nav>

    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            {% if mensagens %}
                {% for msg in mensagens %}
                    <div class="msg-row {% if msg.de_usuario == session['user_id'] %}me-row{% else %}other-row{% endif %}" id="msg-container-{{ msg.id }}">
                        <img src="{{ url_for('static', filename='uploads/' + (usuario_logado.foto if msg.de_usuario == session['user_id'] else usuario_chat.foto)) }}" class="avatar-chat">
                        
                        <div class="message {% if msg.de_usuario == session['user_id'] %}me{% else %}other{% endif %}">
                            
                            {% if msg.visualizacao_unica %}
                                <div class="once-badge"><i class="fa-solid fa-eye-slash"></i> Áudio de Visualização Única</div>
                            {% endif %}

                            {% if msg.mensagem %}
                                <p>{{ msg.mensagem }}</p>
                            {% endif %}

                            {% if msg.foto %}
                                <img src="{{ url_for('static', filename='uploads/' + msg.foto) }}">
                            {% endif %}

                            {% if msg.audio %}
                                <audio 
                                    src="{{ url_for('static', filename='uploads/' + msg.audio) }}" 
                                    controls 
                                    {% if msg.visualizacao_unica %} onended="destruirAudio('{{ msg.id }}')" {% endif %}>
                                
                            {% endif %}

                            {% if msg.de_usuario == session["user_id"] %}
                                <a href="/apagar_mensagem/{{msg.id}}" class="delete-btn">Apagar</a>
                            {% endif %}
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty" id="emptyState">Nenhuma mensagem ainda 💙</div>
            {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data" class="form-area" id="chatForm">
            <input type="text" name="mensagem" id="msgInput" placeholder="Digite uma mensagem" class="msg-input">
            <input type="file" name="foto" id="fotoInput" class="file-input" accept="image/*">
            
            <input type="file" name="audio" id="audioInput" style="display: none;" accept="audio/*">
            <input type="hidden" name="visualizacao_unica" id="hiddenOnceInput" value="0">

            <button type="button" id="viewOnceBtn" class="view-once-btn" title="Visualização Única">
                <i class="fa-solid fa-circle-1"></i>
            </button>

            <button type="button" id="audioBtn" class="audio-btn" title="Gravar Áudio">
                <i class="fa-solid fa-microphone" id="audioIcon"></i>
            </button>

            <button type="submit" class="send-btn" id="sendBtn">Enviar</button>
        </form>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const emptyState = document.getElementById("emptyState");
        chatBox.scrollTop = chatBox.scrollHeight;

        const audioBtn = document.getElementById("audioBtn");
        const audioIcon = document.getElementById("audioIcon");
        const viewOnceBtn = document.getElementById("viewOnceBtn");
        const audioInput = document.getElementById("audioInput");
        const fotoInput = document.getElementById("fotoInput");
        const hiddenOnceInput = document.getElementById("hiddenOnceInput");
        const chatForm = document.getElementById("chatForm");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let isViewOnce = false;

        // Alternar visualização única
        viewOnceBtn.addEventListener("click", () => {
            isViewOnce = !isViewOnce;
            if (isViewOnce) {
                viewOnceBtn.classList.add("active");
                hiddenOnceInput.value = "1";
            } else {
                viewOnceBtn.classList.remove("active");
                hiddenOnceInput.value = "0";
            }
        });

        // Gravação de áudio
        audioBtn.addEventListener("click", async () => {
            if (!isRecording) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Seu navegador não suporta gravação.");
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const file = new File([audioBlob], "audio_message.mp3", { type: "audio/mp3" });
                        
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        audioInput.files = dataTransfer.files;

                        msgInput.placeholder = "🎙️ Áudio pronto para envio!";
                        viewOnceBtn.style.display = "flex";
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    audioBtn.classList.add("recording");
                    audioIcon.className = "fa-solid fa-stop";
                    msgInput.placeholder = "Gravando...";

                } catch (err) {
                    alert("Permissão de microfone negada.");
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                audioBtn.classList.remove("recording");
                audioIcon.className = "fa-solid fa-microphone";
            }
        });

        function destruirAudio(msgId) {
            const elementoMsg = document.getElementById(`msg-container-${msgId}`);
            if (elementoMsg) {
                elementoMsg.style.transition = "0.5s";
                elementoMsg.style.opacity = "0";
                setTimeout(() => elementoMsg.remove(), 500);
            }

            fetch(`/apagar_mensagem/${msgId}`)
                .then(response => console.log("Áudio autodestruído."))
                .catch(err => console.error("Erro:", err));
        }

        // ENVIO SEM RECARREGAR A PÁGINA
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault(); // Impede o recarregamento

            sendBtn.disabled = true;
            sendBtn.textContent = "Enviando...";

            const formData = new FormData(chatForm);

            try {
                // Envia os dados para o servidor
                const response = await fetch(window.location.href, {
                    method: "POST",
                    body: formData
                });

                const resultado = await response.json();

                if (resultado.sucesso) {
                    // Remove aviso de "nenhuma mensagem" se existir
                    if (emptyState) emptyState.remove();

                    // Adiciona a mensagem imediatamente na tela
                    const novaMensagem = document.createElement("div");
                    novaMensagem.className = "msg-row me-row";
                    novaMensagem.id = `msg-container-${resultado.id}`;

                    let conteudo = "";
                    if (resultado.visualizacao_unica) {
                        conteudo += `<div class="once-badge"><i class="fa-solid fa-eye-slash"></i> Áudio de Visualização Única</div>`;
                    }
                    if (resultado.mensagem) {
                        conteudo += `<p>${resultado.mensagem}</p>`;
                    }
                    if (resultado.foto) {
                        conteudo += `<img src="${resultado.foto_url}">`;
                    }
                    if (resultado.audio) {
                        const onEnded = resultado.visualizacao_unica ? `onended="destruirAudio('${resultado.id}')"` : "";
                        conteudo += `<audio src="${resultado.audio_url}" controls ${onEnded}>`;
                    }
                    conteudo += `<a href="/apagar_mensagem/${resultado.id}" class="delete-btn">Apagar</a>`;

                    novaMensagem.innerHTML = `
                        <img src="${resultado.avatar_url}" class="avatar-chat">
                        <div class="message me">
                            ${conteudo}
                        </div>
                    `;

                    chatBox.appendChild(novaMensagem);
                    chatBox.scrollTop = chatBox.scrollHeight;

                    // Limpa o formulário
                    msgInput.value = "";
                    fotoInput.value = "";
                    audioInput.value = "";
                    msgInput.placeholder = "Digite uma mensagem";
                    viewOnceBtn.style.display = "none";
                    viewOnceBtn.classList.remove("active");
                    hiddenOnceInput.value = "0";
                    isViewOnce = false;

                } else {
                    alert("Erro ao enviar mensagem: " + resultado.erro);
                }

            } catch (erro) {
                console.error("Erro na requisição:", erro);
                alert("Não foi possível enviar a mensagem. Tente novamente.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Enviar";
            }
        });

        // Atualização automática para ver mensagens do outro usuário
        setInterval(async () => {
            try {
                const resposta = await fetch("/novas_mensagens");
                const dados = await resposta.json();
                
                dados.novas.forEach(msg => {
                    if (!document.getElementById(`msg-container-${msg.id}`)) {
                        const novaMsg = document.createElement("div");
                        novaMsg.className = "msg-row other-row";
                        novaMsg.id = `msg-container-${msg.id}`;

                        let conteudo = "";
                        if (msg.visualizacao_unica) {
                            conteudo += `<div class="once-badge"><i class="fa-solid fa-eye-slash"></i> Áudio de Visualização Única</div>`;
                        }
                        if (msg.mensagem) conteudo += `<p>${msg.mensagem}</p>`;
                        if (msg.foto) conteudo += `<img src="${msg.foto_url}">`;
                        if (msg.audio) {
                            const onEnded = msg.visualizacao_unica ? `onended="destruirAudio('${msg.id}')"` : "";
                            conteudo += `<audio src="${msg.audio_url}" controls ${onEnded}>`;
                        }

                        novaMsg.innerHTML = `
                            <img src="${msg.avatar_url}" class="avatar-chat">
                            <div class="message other">${conteudo}</div>
                        `;

                        chatBox.appendChild(novaMsg);
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                });
            } catch (e) {
                console.log("Sem novas mensagens");
            }
        }, 2000); // Verifica novas mensagens a cada 2 segundos
    </script>
</body>
</html>
