<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despertar do Amor - Tornar Assinante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 24px;
        }

        p {
            margin-bottom: 25px;
            color: #d1d5db;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        label {
            text-align: left;
            font-weight: bold;
            color: #38bdf8;
        }

        input {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid transparent;
            transition: border-color .3s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 5px rgba(56,189,248,.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59,130,246,.4);
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
            display: none;
        }

        /* RESPONSIVIDADE */
        @media(max-width: 400px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💙 Tornar Usuário Assinante</h1>
        <p>Digite o ID do usuário abaixo para redirecionar para a página de assinatura:</p>

        <div class="form-group">
            <label for="userId">ID do Usuário:</label>
            <input type="number" id="userId" placeholder="Ex: 123" min="1">
        </div>

        <button onclick="redirecionarParaAssinatura()">Ir para Página de Assinatura</button>
        <div class="error" id="errorMsg">⚠️ Por favor, digite um ID válido!</div>
    </div>

    <script>
        // Link base da API
        const LINK_BASE = "https://despertardoamor.onrender.com/tornar-assinante/";

        function redirecionarParaAssinatura() {
            const userIdInput = document.getElementById("userId");
            const errorMsg = document.getElementById("errorMsg");
            const userId = userIdInput.value.trim();

            // Valida se o ID foi preenchido e é um número válido
            if (!userId || isNaN(userId) || userId <= 0) {
                errorMsg.style.display = "block";
                return;
            }

            // Esconde a mensagem de erro se tudo estiver certo
            errorMsg.style.display = "none";

            // Monta o link completo e redireciona
            const linkCompleto = LINK_BASE + userId;
            window.location.href = linkCompleto;
        }

        // Permite enviar ao apertar Enter
        document.getElementById("userId").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                redirecionarParaAssinatura();
            }
        });
    </script>
</body>
</html>
