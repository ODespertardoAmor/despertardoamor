<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Mobile</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
}

#app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #020617;
    position: relative;
    padding-bottom: 75px; 
    box-sizing: border-box;
}

header {
    text-align: center;
    padding: 12px;
}

#avatar {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(167,139,250,0.5);
    transition: box-shadow 0.3s ease;
}

#avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 6px 0;
    font-size: 14px;
}
.user { color: #38bdf8; }
.luna { color: #a78bfa; }

.msg-img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 6px;
}

#controls {
    display: flex;
    gap: 6px;
    padding: 10px;
    background: #020617;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    background: #1e293b;
    color: white;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #38bdf8;
    color: #020617;
    font-weight: bold;
}

.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 420px; 
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid #334155;
    z-index: 100;
    box-sizing: border-box;
}

.menu a {
    color: white;
    text-decoration: none;
    text-align: center;
    font-size: 12px;
}

.menu div {
    line-height: 1.4;
}
</style>
</head>

<body>

<div id="app">

<header>
    <h3>🌙 Luna</h3>
    <div id="avatar">
        <img id="avatarImg" src="{{ url_for('static', filename='imagens/luno02.png') }}" alt="Luna">
    </div>
</header>

<div id="messages"></div>

<div id="controls">
    <input id="texto" placeholder="Digite ou fale" onkeydown="if(event.key === 'Enter') enviar()">
    <button onclick="enviar()">➤</button>
    <button onclick="ouvir()">🎤</button>
</div>

<div class="menu">
    <a href="/"><div>🏠<br>Início</div></a>
    <a href="/"><div>🔙<br>voltar</div></a>
    <a href="/matches"><div>💬<br>Chat</div></a>
    <a href="/matches"><div>❤️<br>Curtidas</div></a>
    <a href="/logout"><div>🏃<br>Sair</div></a>
</div>

</div>

<script>
// API da Luna
const API = "https://luna-ad4s.onrender.com/chat";

// FLASK: Links dos avatares mapeados pelo url_for do servidor
const AVATAR_IDLE = "{{ url_for('static', filename='imagens/luna01.jpg') }}";
const AVATAR_ACTIVE = "{{ url_for('static', filename='imagens/luna03.png') }}";

// FLASK: Banco de imagens dinâmicas localizados na pasta static/imagens/
const imagens = {
    "ajuda": "{{ url_for('static', filename='imagens/ajuda.jpg') }}",
    "site": "{{ url_for('static', filename='imagens/site.jpg') }}",
    "obrigad": "{{ url_for('static', filename='imagens/coracao.png') }}"
};

function removerEmojis(texto) {
    return texto.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, "").trim();
}

// Garante que o sistema reconheça a palavra chave mesmo com acentos diferentes
function removerAcentos(texto) {
    return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function enviar(textoManual = null) {
    const input = document.getElementById("texto");
    let textoOriginal = textoManual || input.value.trim();
    if (!textoOriginal) return;

    add("Você", textoOriginal, "user");

    const textoLimpo = removerEmojis(textoOriginal);

    setAvatar(true);

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: textoLimpo })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(data => {
        const resposta = data.resposta || data.response || "🌙 Recebi, mas não sei responder agora.";
        add("Luna", resposta, "luna", textoOriginal); 
        falar(resposta);
    })
    .catch(() => {
        add("Luna", "Erro de conexão ou servidor reiniciando... 😢 Tente novamente em instantes.", "luna", textoOriginal);
        setAvatar(false);
    });

    input.value = "";
}

function ouvir() {
    if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
        alert("Microfone não suportado neste navegador");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.lang = "pt-BR";

    setAvatar(true);
    rec.start();

    rec.onresult = e => {
        const textoFalado = e.results[0][0].transcript;
        enviar(textoFalado);
    };

    rec.onerror = () => {
        setAvatar(false);
        add("Sistema", "Erro ao ouvir 😢", "luna");
    };
}

function falar(texto) {
    if (!("speechSynthesis" in window)) {
        setAvatar(false);
        return;
    }

    const textoLimpo = removerEmojis(texto);
    if (!textoLimpo) {
        setAvatar(false);
        return;
    }

    window.speechSynthesis.cancel();

    const voz = new SpeechSynthesisUtterance(textoLimpo);
    voz.lang = "pt-BR";

    voz.onstart = () => setAvatar(true);
    voz.onend = () => setAvatar(false);

    window.speechSynthesis.speak(voz);
}

function setAvatar(ativo) {
    const avatar = document.getElementById("avatar");
    const img = document.getElementById("avatarImg");

    if (ativo) {
        img.src = AVATAR_ACTIVE;
        avatar.style.boxShadow = "0 0 35px #a78bfa";
    } else {
        img.src = AVATAR_IDLE;
        avatar.style.boxShadow = "0 0 15px rgba(167,139,250,0.5)";
    }
}

function add(nome, texto, cls, userTexto=null) {
    const div = document.createElement("div");
    div.className = "msg " + cls;

    const verificar = removerAcentos(userTexto || texto).toLowerCase();

    let encontrouImagem = false;
    for (const key in imagens) {
        if (verificar.includes(removerAcentos(key).toLowerCase())) {
            div.innerHTML = `<b>${nome}:</b> ${texto}<br><img class="msg-img" src="${imagens[key]}">`;
            encontrouImagem = true;
            break;
        }
    }

    if (!encontrouImagem) {
        div.innerHTML = `<b>${nome}:</b> ${texto}`;
    }

    const box = document.getElementById("messages");
    box.appendChild(div);
    
    setTimeout(() => {
        box.scrollTop = box.scrollHeight;
    }, 50);
}
</script>

</body>
</html>
