<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    /* IMPORTANTE: Removido overflow hidden para não cortar nada */
}

#app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #020617;
    /* Previne que o menu cubra o conteúdo */
    padding-bottom: 70px; /* Espaço para o menu inferior */
}

header {
    text-align: center;
    padding: 12px;
    background: linear-gradient(180deg, #1e293b, transparent);
}

#avatar {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(167,139,250,0.5);
    transition: box-shadow 0.3s ease;
}

#avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #020617;
}

.msg {
    margin: 6px 0;
    font-size: 14px;
}
.user { color: #38bdf8; }
.luna { color: #a78bfa; }

.msg-img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 6px;
}

/* BARRA DE ENVIO DE MENSAGEM VISÍVEL */
#controls {
    display: flex;
    gap: 6px;
    padding: 10px;
    background: #1e293b;
    border-top: 1px solid #334155;
    /* Garante que não fique escondida */
    position: relative;
    z-index: 20;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    color: white;
    background: #0f172a;
}

button {
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: white;
    background: #3b82f6;
}

button:hover {
    opacity: 0.9;
}

/* MENU INFERIOR AJUSTADO */
.menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    max-width: 420px; /* Igual ao tamanho do app */
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid #333;
    z-index: 100;
}

.menu a {
    color: white;
    text-decoration: none;
    text-align: center;
    font-size: 12px;
}

/* CORRIGINDO O CAMINHO DA IMAGEM */
#avatarImg {
    /* Caminho correto sem erro de digitação */
    src: "/static/imagens/luna03.png";
}

/* AJUSTES RESPONSIVOS */
@media(max-width: 420px) {
    #app {
        padding-bottom: 80px; /* Mais espaço no celular */
    }
}
</style>
</head>

<body>

<div id="app">

<header>
    <h3>🌙 Luna</h3>
    <div id="avatar">
        <img id="avatarImg" src="/static/imagens/luna03.png" alt="Luna">
    </div>
</header>

<div id="messages"></div>

<div id="controls">
    <input id="texto" placeholder="Digite sua mensagem...">
    <button onclick="enviar()">➤</button>
    <button onclick="ouvir()">🎤</button>
</div>

</div>

<!-- MENU INFERIOR -->
<div class="menu">
    <a href="/"><div>🏠<br>Início</div></a>
    <a href="/perfil"><div>🖼️<br>Foto</div></a>
    <a href="/chat"><div>💬<br>Chat</div></a>
    <a href="/curtidas"><div>❤️<br>Curtidas</div></a>
    <a href="/logout"><div>🏃<br>Sair</div></a>
</div>

<script>
// API CORRETA
const API = "https://luna-ad4s.onrender.com/chat";

// CORRIGINDO CAMINHO DAS IMAGENS
const AVATAR_IDLE = "/static/imagens/luna02.png";
const AVATAR_ACTIVE = "/static/imagens/luna01.jpg";

const imagens = {
    "junior": "/static/imagens/junior.jpg",
    "ajuda": "/static/imagens/ajuda.jpg",
    "obrigad": "/static/imagens/coracao.png"
};

// FUNÇÃO DE ENVIO CORRIGIDA
function enviar() {
    const texto = document.getElementById("texto").value.trim();
    if (!texto) return;

    add("Você", texto, "user");
    document.getElementById("texto").value = "";

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: texto })
    })
    .then(res => res.json())
    .then(data => {
        add("Luna", data.resposta, "luna");
        falar(data.resposta);
    });
}

// FUNÇÕES AJUSTADAS
function add(nome, texto, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = `<b>${nome}:</b> ${texto}`;
    
    // Verifica imagem
    const textoLimpo = texto.toLowerCase().replace(/[^\w\s]/gi, '');
    for (let key in imagens) {
        if (textoLimpo.includes(key)) {
            div.innerHTML += `<br><img class="msg-img" src="${imagens[key]}">`;
            break;
        }
    }

    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

function ouvir() {
    if (!("webkitSpeechRecognition" in window)) {
        alert("Microfone não suportado");
        return;
    }

    const rec = new webkitSpeechRecognition();
    rec.lang = "pt-BR";
    rec.start();

    rec.onresult = e => {
        document.getElementById("texto").value = e.results[0][0].transcript;
    };
}

function falar(texto) {
    if (!("speechSynthesis" in window)) return;
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "pt-BR";
    speechSynthesis.speak(voz);
}

// CORRIGINDO O ERRO DE DIGITAÇÃO NO CAMINHO DA IMAGEM
document.getElementById("avatarImg").src = "/static/imagens/luna03.png";
</script>

</body>
</html>
