<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
}

#app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #020617;
    padding-bottom: 70px; /* Espaço para o menu inferior */
}

header {
    text-align: center;
    padding: 12px;
    background: linear-gradient(180deg, #1e293b, transparent);
}

#avatar {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(167,139,250,0.5);
    transition: box-shadow 0.3s ease;
}

#avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #020617;
}

.msg {
    margin: 6px 0;
    font-size: 14px;
}
.user { color: #38bdf8; }
.luna { color: #a78bfa; }
.sistema { color: #ef4444; font-style: italic; } /* Estilo para erros */

.msg-img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 6px;
}

#controls {
    display: flex;
    gap: 6px;
    padding: 10px;
    background: #1e293b;
    border-top: 1px solid #334155;
    position: relative;
    z-index: 20;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    color: white;
    background: #0f172a;
}

button {
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: white;
    background: #3b82f6;
}

button:hover {
    opacity: 0.9;
}

.menu {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px; /* Alinhado perfeitamente ao app centralizado */
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid #333;
    z-index: 100;
}

.menu a {
    color: white;
    text-decoration: none;
    text-align: center;
    font-size: 12px;
}

@media(max-width: 420px) {
    #app {
        padding-bottom: 80px;
    }
}
</style>
</head>

<body>

<div id="app">

<header>
    <h3>🌙 Luna</h3>
    <div id="avatar">
        <img id="avatarImg" src="/static/imagens/luna03.png" alt="Luna">
    </div>
</header>

<div id="messages"></div>

<div id="controls">
    <input id="texto" placeholder="Digite sua mensagem..." onkeydown="if(event.key === 'Enter') enviar()">
    <button onclick="enviar()">➤</button>
    <button onclick="ouvir()">🎤</button>
</div>

</div>

<div class="menu">
    <a href="/"><div>🏠<br>Início</div></a>
    <a href="/perfil"><div>🖼️<br>Foto</div></a>
    <a href="/chat"><div>💬<br>Chat</div></a>
    <a href="/curtidas"><div>❤️<br>Curtidas</div></a>
    <a href="/logout"><div>🏃<br>Sair</div></a>
</div>

<script>
// API DO RENDER
const API = "https://luna-ad4s.onrender.com/chat";

// CAMINHO DAS IMAGENS
const AVATAR_IDLE = "/static/imagens/luna02.png";
const AVATAR_ACTIVE = "/static/imagens/luna01.jpg";

const imagens = {
    "junior": "/static/imagens/junior.jpg",
    "ajuda": "/static/imagens/ajuda.jpg",
    "obrigad": "/static/imagens/coracao.png"
};

function enviar() {
    const inputTexto = document.getElementById("texto");
    const texto = inputTexto.value.trim();
    if (!texto) return;

    add("Você", texto, "user");
    inputTexto.value = "";
    
    // Alterna o avatar para o modo ativo (pensando/respondendo)
     mudarAvatar(AVATAR_ACTIVE);

    fetch(API, {
        method: "POST",
        headers: { 
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ texto: texto })
    })
    .then(res => {
        if (!res.ok) throw new Error("Erro na resposta do servidor");
        return res.json();
    })
    .then(data => {
        add("Luna", data.resposta, "luna");
        falar(data.resposta);
        mudarAvatar(AVATAR_IDLE);
    })
    .catch(err => {
        console.error("Erro de conexão:", err);
        add("Sistema", "Não foi possível conectar à Luna. O servidor pode estar iniciando, tente novamente em instantes.", "sistema");
        mudarAvatar(AVATAR_IDLE);
    });
}

function add(nome, texto, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = `<b>${nome}:</b> ${texto}`;
    
    // Processamento de imagens locais por palavra-chave
    const textoLimpo = texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
    for (let key in imagens) {
        if (textoLimpo.includes(key)) {
            div.innerHTML += `<br><img class="msg-img" src="${imagens[key]}" alt="${key}">`;
            break;
        }
    }

    const box = document.getElementById("messages");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function mudarAvatar(src) {
    const img = document.getElementById("avatarImg");
    if (img) img.src = src;
}

function ouvir() {
    if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
        alert("Microfone ou reconhecimento de voz não suportado neste navegador.");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.lang = "pt-BR";
    rec.start();

    rec.onresult = e => {
        document.getElementById("texto").value = e.results[0][0].transcript;
    };
}

function falar(texto) {
    if (!("speechSynthesis" in window)) return;
    // Cancela falas anteriores se houver fila
    window.speechSynthesis.cancel(); 
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "pt-BR";
    window.speechSynthesis.speak(voz);
}
</script>

</body>
</html>
