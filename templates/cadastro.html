<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - D/❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:1000px;
            background:#1e293b;
            border-radius:30px;
            overflow:hidden;
            display:flex;
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
        }

        .left{
            flex:1;
            background:linear-gradient(135deg, rgba(255, 77, 109, 0.85), rgba(255, 117, 143, 0.85)), 
                        url('https://raw.githubusercontent.com/ODespertardoAmor/despertardoamor/refs/heads/main/Foto/login1.jpg') center/cover no-repeat;
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            color:white;
            position: relative;
            z-index: 1;
        }

        .left h1{
            font-size:52px;
            margin-bottom:25px;
            line-height:1.1;
            position: relative;
            z-index: 2;
        }

        .left p{
            font-size:18px;
            line-height:1.8;
            position: relative;
            z-index: 2;
        }

        .right{
            flex:1;
            padding:50px;
            background:#111827;
        }

        .right h2{
            color:white;
            font-size:36px;
            margin-bottom:35px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        input, textarea{

            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:14px;
            background:#1e293b;
            color:white;
            font-size:16px;

        }

        textarea{
            resize:none;
            height:120px;
        }

        input::placeholder,
        textarea::placeholder{
            color:#94a3b8;
        }

        /* ESTILO PARA O CAMPO DE IDADE COM RESTRIÇÃO */
        .idade-container {
            position: relative;
        }

        .erro-idade {
            color: #ff4d6d;
            font-size: 13px;
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 5px;
        }

        /* MARCA O CAMPO COMO INVÁLIDO QUANDO IDADE FOR MENOR */
        input[name="idade"]:invalid {
            border: 2px solid #ff4d6d;
        }

        .btn{

            background:#ff4d6d;
            color:white;
            border:none;
            padding:18px;
            border-radius:14px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;

        }

        .btn:hover{
            background:#ff3355;
            transform:translateY(-3px);
        }

        .login-link{
            margin-top:25px;
            text-align:center;
            color:#cbd5e1;
        }

        .login-link a{
            color:#ff4d6d;
            text-decoration:none;
            font-weight:600;
        }

        @media(max-width:900px){

            .container{
                flex-direction:column;
            }

            .left{
                padding:40px;
            }

            .left h1{
                font-size:40px;
            }

        }

    </style>

</head>
<body>

    <div class="container">

        <div class="left">

            <h1>
                Encontre conexões reais ❤️
            </h1>

            <p>
                Crie sua conta agora e conheça pessoas incríveis perto de você.
                Matches, conversas e novas experiências começam aqui.
            </p>

        </div>


        <div class="right">

            <h2>Criar Conta</h2>

            
            <form method="POST" enctype="multipart/form-data" onsubmit="return validarIdade()">
                <input type="text"
                       name="nome"
                       placeholder="Seu nome"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Seu email"
                       required>

                <input type="password"
                       name="senha"
                       placeholder="Sua senha"
                       required>

                <!-- CAMPO DE IDADE COM RESTRIÇÕES -->
                <div class="idade-container">
                    <input type="number"
                           name="idade"
                           placeholder="Sua idade"
                           min="18"  <!-- RESTRIÇÃO HTML BÁSICA -->
                           max="120"
                           required>
                    <div class="erro-idade" id="erroIdade">
                        <i class="fas fa-exclamation-triangle"></i>
                        Apenas maiores de 18 anos podem se cadastrar!
                    </div>
                </div>

                <input type="text"
                       name="cidade"
                       placeholder="Sua cidade"
                       required>

                <textarea name="bio"
                          placeholder="Fale um pouco sobre você"></textarea>
                <input type="file" name="foto" required>

                <button class="btn" type="submit">
                    Criar Conta
                </button>

            </form>

            <div class="login-link">
                Já possui conta?
                <a href="/login">Entrar</a>
            </div>

        </div>

    </div>

    <script>
        // VALIDAÇÃO EM JAVASCRIPT PARA GARANTIR A RESTRIÇÃO
        function validarIdade() {
            const idadeInput = document.querySelector('input[name="idade"]');
            const idade = parseInt(idadeInput.value);
            const erroMensagem = document.getElementById('erroIdade');

            // Verifica se a idade é menor que 18 ou não é um número válido
            if (isNaN(idade) || idade < 18 || idade > 120) {
                erroMensagem.style.display = 'flex'; // Mostra mensagem de erro
                idadeInput.focus(); // Direciona o foco para o campo
                return false; // Bloqueia o envio do formulário
            } else {
                erroMensagem.style.display = 'none'; // Esconde mensagem se tudo estiver certo
                return true; // Permite o envio
            }
        }

        // MOSTRA A MENSAGEM DE ERRO AO DIGITAR UMA IDADE INVÁLIDA
        document.querySelector('input[name="idade"]').addEventListener('input', function() {
            const idade = parseInt(this.value);
            const erroMensagem = document.getElementById('erroIdade');
            
            if (isNaN(idade) || idade < 18 || idade > 120) {
                erroMensagem.style.display = 'flex';
            } else {
                erroMensagem.style.display = 'none';
            }
        });
    </script>

</body>
</html>
