<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D/Amor - Entrar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;

            background:
                linear-gradient(rgba(15,23,42,.85), rgba(15,23,42,.95)),
                url("{{ url_for('static', filename='imagens/capa.png') }}") center/cover no-repeat;
        }

        .container-login {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: #d1d5db;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .form-grupo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.4);
        }

        .link-cadastro {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 15px;
        }

        .link-cadastro a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }

        .mensagem-erro {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container-login">
        <h1 class="logo">💙 D/Amor</h1>
        <p class="subtitulo">Entre para encontrar pessoas especiais</p>

        <!-- Se quiser exibir mensagem de erro, descomente abaixo -->
        <!-- <div class="mensagem-erro">E-mail ou senha incorretos!</div> -->

        <form action="/login" method="POST">
            <div class="form-grupo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
            </div>

            <div class="form-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <p class="link-cadastro">
            Ainda não tem conta? <a href="/cadastro">Cadastre-se aqui</a>
        </p>
    </div>

</body>
</html>
