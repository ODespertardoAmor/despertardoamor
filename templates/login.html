<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Despertar Do Amor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:950px;
            background:#1e293b;
            border-radius:30px;
            overflow:hidden;
            display:flex;
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
        }

        .left{
            flex:1;
            background:linear-gradient(135deg,#2563eb,#38bdf8);
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            color:white;
        }

        .left h1{
            font-size:52px;
            margin-bottom:25px;
            line-height:1.1;
        }

        .left p{
            font-size:18px;
            line-height:1.8;
            margin-bottom:20px;
        }

        .imagem-secao{
            width:100%;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .right{
            flex:1;
            padding:55px;
            background:#111827;
        }

        .right h2{
            color:#38bdf8;
            font-size:36px;
            margin-bottom:35px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        input{

            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:14px;
            background:#1e293b;
            color:white;
            font-size:16px;

        }

        input::placeholder{
            color:#94a3b8;
        }

        .btn{

            background:#2563eb;
            color:white;
            border:none;
            padding:18px;
            border-radius:14px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;

        }

        .btn:hover{
            background:#1d4ed8;
            transform:translateY(-3px);
        }

        .cadastro-link{
            margin-top:25px;
            text-align:center;
            color:#cbd5e1;
        }

        .cadastro-link a{
            color:#38bdf8;
            text-decoration:none;
            font-weight:600;
        }

        @media(max-width:900px){

            .container{
                flex-direction:column;
            }

            .left{
                padding:40px;
            }

            .left h1{
                font-size:42px;
            }

        }

    </style>

</head>
<body>

    <div class="container">

        <div class="left">

            <h1>
                Bem-vindo ao Despertar Do Amor 💙
            </h1>

            <p>
                Entre na sua conta para encontrar novos matches,
                conversar e descobrir pessoas incríveis.
            </p>

            <img
                src="https://picsum.photos/id/64/600/400"
                alt="Imagem ilustrativa"
                class="imagem-secao"
            >

        </div>


        <div class="right">

            <h2>Entrar</h2>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Seu email"
                    required
                >

                <input
                    type="password"
                    name="senha"
                    placeholder="Sua senha"
                    required
                >

                <button class="btn" type="submit">
                    Entrar
                </button>

            </form>

            <div class="cadastro-link">

                Não possui conta?

                <a href="/cadastro">
                    Criar conta
                </a>

            </div>

        </div>

    </div>

</body>
</html>
