<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D/Amor</title>

    <style>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

/* TOPO COM CAPA */
.topo{
    position:relative;
    min-height:320px;

    background:
        linear-gradient(
            rgba(0,0,0,.35),
            rgba(15,23,42,.95)
        ),
        url("{{ url_for('static', filename='imagens/capa.png') }}");

    background-size:cover;
    background-position:center;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:20px;
    margin-bottom:90px;
}

/* LOGO */
.logo{
    font-size:34px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,.4);
}

/* MENU */
.menu-superior{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

/* BOTÕES */
.btn{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    padding:12px 18px;
    text-decoration:none;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:14px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(59,130,246,.4);
}

/* PERFIL */
.area-perfil{
    position:absolute;
    left:50%;
    bottom:-70px;
    transform:translateX(-50%);
    width:100%;
    max-width:500px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

.perfil-info{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.15);

    padding:20px;
    border-radius:25px;

    display:flex;
    flex-direction:column;
    align-items:center;

    width:90%;
}

.avatar-user{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;

    border:5px solid white;

    box-shadow:
        0 0 25px rgba(56,189,248,.6);
}

.nome-user{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
    color:white;
}

/* FORM FOTO */
.avatar-form{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    width:90%;
}

.avatar-form input[type="file"]{
    width:100%;
    background:#1e293b;
    color:white;
    border:1px solid #334155;
    padding:12px;
    border-radius:12px;
}

/* CONTEÚDO */
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* TÍTULO */
.titulo{
    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;
    font-size:32px;
}

/* CARDS */
.card{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:24px;

    padding:20px;

    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;

    margin-bottom:20px;

    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.avatar-outro{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;

    margin-bottom:15px;

    border:4px solid #38bdf8;
}

.card h2{
    color:#38bdf8;
    margin-bottom:10px;
}

.card p{
    color:#d1d5db;
    margin-bottom:8px;
}

/* AÇÕES */
.acoes{
    margin-top:20px;
    display:flex;
    gap:10px;
    width:100%;
}

.acoes .btn{
    flex:1;
    text-align:center;
}

/* CHAT */
.wrapper-chat{
    position:relative;
    flex:1;
    display:flex;
}

.wrapper-chat .btn{
    width:100%;
}

.badge-notificacao{
    background:#ef4444;
    color:white;
    font-size:11px;
    font-weight:bold;

    position:absolute;
    top:-8px;
    right:-5px;

    min-width:20px;
    height:20px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;
    border:2px solid #1e293b;
}

/* DESKTOP */
@media(min-width:768px){

    .topo{
        min-height:360px;
    }

    .menu-superior{
        justify-content:flex-end;
    }

    .container{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
        gap:20px;
    }

    .titulo{
        grid-column:1/-1;
    }

    .card{
        margin-bottom:0;
    }
}
</style>

</head>
<body>

    <div class="topo">
        <div class="logo">
            💙 D/Amor
        </div>

        <div class="menu-superior">
            <a href="/" class="btn">Home</a>
            <a href="/matches" class="btn">Pessoas</a>
            <a href="/logout" class="btn">Sair</a>
        </div>

        <div class="area-perfil">
            <div class="perfil-info">
                <img src="{{ url_for('static', filename='uploads/' + usuario_logado.foto) }}" class="avatar-user">
                <div class="nome-user">
                    {{usuario_logado.nome}}
                </div>
            </div>

            <form action="/upload_foto" method="POST" enctype="multipart/form-data" class="avatar-form">
                <input type="file" name="foto" required>
                <button type="submit" class="btn">Alterar Foto</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h1 class="titulo">
            Pessoas disponíveis
        </h1>

        {% for u in usuarios %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/' + u.foto) }}" class="avatar-outro">

            <h2>{{u.nome}}, {{u.idade}}</h2>
            <p>📍 {{u.cidade}}</p>
            <p>{{u.bio}}</p>

            <div class="acoes">
                <a href="/curtir/{{u.id}}" class="btn">Curtir</a>
                
                <div class="wrapper-chat">
                    <a href="/chat/{{u.id}}" class="btn">Chat</a>
                    
                    {% if notificacoes and notificacoes[u.id] > 0 %}
                        <span class="badge-notificacao">{{ notificacoes[u.id] }}</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
