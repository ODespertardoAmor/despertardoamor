<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D/Amor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        /* TOPO COM CAPA */
        .topo {
            position: relative;
            min-height: 320px;
            background:
                linear-gradient(rgba(0,0,0,.35), rgba(15,23,42,.95)),
                url("{{ url_for('static', filename='imagens/capa.png') }}");
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        /* LOGO */
        .logo {
            position: absolute;
            top: 20px;
            left: 220px;
            font-size: 34px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,.4);
        }

        /* PERFIL - COMPORTAMENTO PARA COMPUTADOR */
        .area-perfil {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 180px;
            z-index: 10;
        }

        .perfil-info {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.15);
            padding: 12px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .avatar-user {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56,189,248,.4);
        }

        .nome-user {
            margin-top: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #38bdf8;
            text-align: center;
        }

        /* FORMULÁRIO DE FOTO */
        .avatar-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .avatar-form input[type="file"] {
            width: 100%;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        /* BOTÕES */
        .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 10px 14px;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            transition: .3s;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59,130,246,.4);
        }

        /* MENU ABAIXO DO ALTERAR FOTO */
        .menu-superior {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-top: 5px;
        }

        /* CONTEÚDO PRINCIPAL - SÓ ROLA NO COMPUTADOR */
        @media(min-width: 768px) {
            body {
                overflow: hidden;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .topo {
                flex-shrink: 0;
            }

            .container {
                overflow-y: auto;
                flex: 1;
                max-width: 900px;
                margin: 0 auto;
                padding: 20px;
            }
        }

        /* COMPORTAMENTO PARA CELULAR */
        @media(max-width: 767px) {
            body {
                overflow: auto;
                height: auto;
            }

            .topo {
                min-height: auto;
                padding-bottom: 30px;
            }

            .logo {
                position: static;
                text-align: center;
                margin: 20px 0;
                font-size: 28px;
            }

            .area-perfil {
                position: static;
                margin: 0 auto;
                width: 90%;
                max-width: 280px;
            }

            .container {
                padding: 20px;
            }
        }

        .titulo {
            text-align: center;
            margin-bottom: 30px;
            color: #38bdf8;
            font-size: 32px;
        }

        /* NOVO ESTILO DOS CARDS - UM EMBAIXO DO OUTRO */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,.3);
            border-color: #38bdf8;
        }

        .avatar-outro {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
            flex-shrink: 0;
        }

        .info-perfil {
            flex: 1;
            text-align: left;
        }

        .info-perfil h2 {
            color: #38bdf8;
            margin-bottom: 8px;
            font-size: 22px;
        }

        .info-perfil p {
            color: #d1d5db;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .acoes {
            display: flex;
            gap: 12px;
            min-width: 180px;
        }

        .acoes .btn {
            flex: 1;
            text-align: center;
            padding: 12px;
        }

        /* NOTIFICAÇÃO CHAT */
        .wrapper-chat {
            position: relative;
            flex: 1;
            display: flex;
        }

        .wrapper-chat .btn {
            width: 100%;
        }

        .badge-notificacao {
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: bold;
            position: absolute;
            top: -8px;
            right: -5px;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid #1e293b;
        }

        /* ADAPTAÇÃO DO CARD NO CELULAR */
        @media(max-width: 600px) {
            .card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .info-perfil {
                text-align: center;
            }

            .acoes {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="topo">
        <div class="logo">
            💙 D/Amor
        </div>

        <!-- ÁREA DO PERFIL -->
        <div class="area-perfil">
            <div class="perfil-info">
                <img src="{{ url_for('static', filename='uploads/' + usuario_logado.foto) }}" class="avatar-user">
                <div class="nome-user">
                    {{usuario_logado.nome}}
                </div>
            </div>

            <form action="/upload_foto" method="POST" enctype="multipart/form-data" class="avatar-form">
                <input type="file" name="foto" required>
                <button type="submit" class="btn">Alterar Foto📸</button>
            </form>

            <!-- BOTÕES ABAIXO -->
            <div class="menu-superior">
                <a href="/matches" class="btn">loves🌹</a>
                <a href="/logout" class="btn">Sair🏃</a>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="container">
        <h1 class="titulo">
            Pessoas disponíveis
        </h1>

        {% for u in usuarios %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/' + u.foto) }}" class="avatar-outro">

            <div class="info-perfil">
                <h2>{{u.nome}}, {{u.idade}}</h2>
                <p>📍 {{u.cidade}}</p>
                <p>{{u.bio}}</p>
            </div>

            <div class="acoes">
                <a href="/curtir/{{u.id}}" class="btn">Curtir</a>
                
                <div class="wrapper-chat">
                    <a href="/chat/{{u.id}}" class="btn">Chat</a>
                    
                    {% if notificacoes and notificacoes[u.id] > 0 %}
                        <span class="badge-notificacao">{{ notificacoes[u.id] }}</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
