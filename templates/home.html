<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>D/Amor</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            margin:0;
        }

        .topo{
            background:#1e293b;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:#ff4d6d;
        }

        .menu{
            display:flex;
            gap:10px;
        }

        .btn{
            background:#ff4d6d;
            color:white;
            padding:10px 18px;
            text-decoration:none;
            border-radius:10px;
        }

        .container{
            padding:40px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:20px;
            margin-bottom:20px;
        }

        .acoes{
            margin-top:20px;
            display:flex;
            gap:10px;
        }

    </style>

</head>
<body>

    <div class="topo">

        <div class="logo">
            ❤️
        </div>

        <div class="menu">

            <a href="/" class="btn">
                Home
            </a>

            <a href="/matches" class="btn">
                Pessoas 
            </a>

            <a href="/logout" class="btn">
                Sair
            </a>

        </div>

    </div>


    <div class="container">

        <h1>
            Pessoas disponíveis
        </h1>

        <br>

        {% for u in usuarios %}

        <div class="card">

            <h2>
                {{u.nome}}, {{u.idade}}
            </h2>

            <p>
                Cidade: {{u.cidade}}
            </p>

            <p>
                {{u.bio}}
            </p>

            <div class="acoes">

                <a href="/curtir/{{u.id}}" class="btn">
                    Curtir
                </a>

                <a href="/chat/{{u.id}}" class="btn">
                    Chat
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
