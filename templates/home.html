<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>D/Amor</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            margin:0;
        }

        .topo{
            background:#1e293b;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:#ff4d6d;
        }

        .menu-superior{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .btn{
            background:#ff4d6d;
            color:white;
            padding:10px 18px;
            text-decoration:none;
            border-radius:10px;
            border:none;
            cursor:pointer;
            font-size: 15px;
        }

        .btn:hover{
            background:#ff3355;
        }

        .area-perfil{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .avatar-user{
            width:55px;
            height:55px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #ff4d6d;
        }

        .avatar-form{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .container{
            padding:40px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:20px;
            margin-bottom:20px;
        }

        .acoes{
            margin-top:20px;
            display:flex;
            gap:10px;
        }

        .avatar-outro{
            width: 120px;
            height: 120px;
            border-radius:50%;
            object-fit:cover;
            margin-bottom:15px;
        }

        @media(max-width:768px){
            .topo{
                flex-direction: column;
                align-items: flex-start;
            }
            .menu-superior, .area-perfil{
                width: 100%;
                justify-content: space-between;
            }
        }

    </style>

</head>
<body>

    <div class="topo">

        <div class="logo">
            ❤️ D/Amor
        </div>

        <!-- BOTÕES DE NAVEGAÇÃO - EM CIMA -->
        <div class="menu-superior">
            <a href="/" class="btn">Home</a>
            <a href="/matches" class="btn">Pessoas</a>
            <a href="/logout" class="btn">Sair</a>
        </div>

        <!-- ÁREA DA FOTO E BOTÃO ALTERAR - EMBAIXO/LADO -->
        <div class="area-perfil">
            <img
                src="{{ url_for('static', filename='uploads/' + usuario_logado.foto) }}"
                class="avatar-user"
            >

            <form
                action="/upload_foto"
                method="POST"
                enctype="multipart/form-data"
                class="avatar-form"
            >
                <input type="file" name="foto" required>
                <button type="submit" class="btn">Alterar</button>
            </form>
        </div>

    </div>


    <div class="container">

        <h1>Pessoas disponíveis</h1>
        <br>

        {% for u in usuarios %}

        <div class="card">

            <img
                src="{{ url_for('static', filename='uploads/' + u.foto) }}"
                class="avatar-outro"
            >

            <h2>{{u.nome}}, {{u.idade}}</h2>
            <p>Cidade: {{u.cidade}}</p>
            <p>{{u.bio}}</p>

            <div class="acoes">
                <a href="/curtir/{{u.id}}" class="btn">Curtir</a>
                <a href="/chat/{{u.id}}" class="btn">Chat</a>
            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
