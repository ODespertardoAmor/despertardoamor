<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D/Amor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
        }

        .topo{
            background:#1e293b;
            padding:15px;
            display:flex;
            flex-direction:column;
            gap:20px;
            position:sticky;
            top:0;
            z-index:1000;
            border-bottom:2px solid #38bdf8;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#38bdf8;
            text-align:center;
        }

        .menu-superior{
            display:flex;
            justify-content:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            background:#2563eb;
            color:white;
            padding:10px 16px;
            text-decoration:none;
            border-radius:12px;
            border:none;
            cursor:pointer;
            font-size:14px;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .area-perfil{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:15px;
        }

        .perfil-info{
            display:flex;
            align-items:center;
            gap:12px;
            background:#0f172a;
            padding:10px 15px;
            border-radius:20px;
        }

        .nome-user{
            font-size:16px;
            font-weight:bold;
            color:#38bdf8;
        }

        .avatar-user{
            width:70px;
            height:70px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #38bdf8;
        }

        .avatar-form{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
            width:100%;
        }

        .avatar-form input[type="file"]{
            background:#0f172a;
            color:white;
            padding:10px;
            border-radius:12px;
            width:100%;
            max-width:300px;
            border:1px solid #334155;
        }

        .container{
            padding:20px;
        }

        .titulo{
            text-align:center;
            margin-bottom:25px;
            color:#38bdf8;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:24px;
            margin-bottom:20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
            border:1px solid #334155;
        }

        .avatar-outro{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            margin-bottom:15px;
            border:3px solid #38bdf8;
        }

        .card h2{
            margin-bottom:10px;
            color:#38bdf8;
        }

        .card p{
            margin-bottom:8px;
            color:#d1d5db;
        }

        .acoes{
            margin-top:20px;
            display:flex;
            gap:10px;
            width:100%;
        }

        /* Container relativo para alinhar a bolinha de notificação */
        .wrapper-chat {
            position: relative;
            flex: 1;
            display: flex;
        }

        .wrapper-chat .btn {
            width: 100%;
        }

        /* Estilo da Bolinha Vermelha de Mensagens */
        .badge-notificacao {
            background-color: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 7px;
            border-radius: 50%;
            position: absolute;
            top: -8px;
            right: -5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #1e293b;
        }

        .acoes .btn{
            flex:1;
            text-align:center;
        }

        @media(min-width:768px){
            .topo{
                flex-direction:row;
                justify-content:space-between;
                align-items:center;
            }

            .logo{
                text-align:left;
            }

            .menu-superior{
                justify-content:flex-start;
            }

            .area-perfil{
                flex-direction:row;
            }

            .avatar-form{
                flex-direction:row;
                width:auto;
            }

            .container{
                max-width:1100px;
                margin:auto;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
            }
            
            .card {
                margin-bottom: 0px;
            }
            
            .titulo {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>

    <div class="topo">
        <div class="logo">
            💙 D/Amor
        </div>

        <div class="menu-superior">
            <a href="/" class="btn">Home</a>
            <a href="/matches" class="btn">Pessoas</a>
            <a href="/logout" class="btn">Sair</a>
        </div>

        <div class="area-perfil">
            <div class="perfil-info">
                <img src="{{ url_for('static', filename='uploads/' + usuario_logado.foto) }}" class="avatar-user">
                <div class="nome-user">
                    {{usuario_logado.nome}}
                </div>
            </div>

            <form action="/upload_foto" method="POST" enctype="multipart/form-data" class="avatar-form">
                <input type="file" name="foto" required>
                <button type="submit" class="btn">Alterar Foto</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h1 class="titulo">
            Pessoas disponíveis
        </h1>

        {% for u in usuarios %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/' + u.foto) }}" class="avatar-outro">

            <h2>{{u.nome}}, {{u.idade}}</h2>
            <p>📍 {{u.cidade}}</p>
            <p>{{u.bio}}</p>

            <div class="acoes">
                <a href="/curtir/{{u.id}}" class="btn">Curtir</a>
                
                <div class="wrapper-chat">
                    <a href="/chat/{{u.id}}" class="btn">Chat</a>
                    
                    {% if notificacoes and notificacoes[u.id] > 0 %}
                        <span class="badge-notificacao">{{ notificacoes[u.id] }}</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
