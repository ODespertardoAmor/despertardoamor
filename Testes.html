<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta do Amor 💘 - Despertar do Amor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .voltar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #38bdf8;
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .voltar:hover {
            color: #7dd3fc;
            transform: translateX(-3px);
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* Área da Roleta */
        .roleta-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
        }

        .roleta {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #2563eb 0deg 60deg,
                #7c3aed 60deg 120deg,
                #db2777 120deg 180deg,
                #f59e0b 180deg 240deg,
                #10b981 240deg 300deg,
                #8b5cf6 300deg 360deg
            );
            position: relative;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            border: 8px solid #1e293b;
        }

        .ponteiro {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ef4444;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .centro {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
            border: 4px solid #38bdf8;
            z-index: 5;
        }

        /* Opções da roleta */
        .opcoes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50%;
        }

        .opcao {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            left: 50%;
            transform-origin: bottom left;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.7);
            padding-left: 20px;
        }

        .opcao:nth-child(1) { transform: rotate(30deg); }
        .opcao:nth-child(2) { transform: rotate(90deg); }
        .opcao:nth-child(3) { transform: rotate(150deg); }
        .opcao:nth-child(4) { transform: rotate(210deg); }
        .opcao:nth-child(5) { transform: rotate(270deg); }
        .opcao:nth-child(6) { transform: rotate(330deg); }

        /* Botão girar */
        .btn-girar {
            padding: 15px 40px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .btn-girar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
        }

        .btn-girar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .resultado {
            margin-top: 30px;
            padding: 20px;
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            display: none;
        }

        .resultado h3 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .resultado p {
            color: #e2e8f0;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="voltar">
            <i class="fa-solid fa-arrow-left"></i> Voltar para a página inicial
        </a>

        <h1>🎡 Roleta do Amor</h1>
        <p class="subtitulo">Gire a roleta e descubra uma surpresa ou dica especial para o seu coração!</p>

        <div class="roleta-container">
            <div class="ponteiro"></div>
            <div class="roleta" id="roleta">
                <div class="opcoes">
                    <div class="opcao">💘 Encontro</div>
                    <div class="opcao">💌 Mensagem</div>
                    <div class="opcao">💫 Sorte</div>
                    <div class="opcao">❤️ Paixão</div>
                    <div class="opcao">✨ Surpresa</div>
                    <div class="opcao">💞 Carinho</div>
                </div>
            </div>
            <div class="centro">❤</div>
        </div>

        <button class="btn-girar" id="btnGirar" onclick="girarRoleta()">Girar a Roleta!</button>

        <div class="resultado" id="resultado">
            <h3 id="tituloResultado"></h3>
            <p id="textoResultado"></p>
        </div>
    </div>

    <script>
        const roleta = document.getElementById('roleta');
        const btnGirar = document.getElementById('btnGirar');
        const resultadoDiv = document.getElementById('resultado');
        const tituloResultado = document.getElementById('tituloResultado');
        const textoResultado = document.getElementById('textoResultado');

        // Opções e suas mensagens
        const opcoes = [
            {
                nome: "💘 Encontro Especial",
                mensagem: "Hoje é um ótimo dia para conhecer alguém novo! Fique atento(a) aos perfis, a pessoa certa pode estar esperando por você."
            },
            {
                nome: "💌 Envie uma Mensagem",
                mensagem: "Não deixe a timidez vencer! Escolha um perfil que gostou e envie uma mensagem simpática — uma atitude pode mudar tudo."
            },
            {
                nome: "💫 Sorte no Amor",
                mensagem: "A sorte está ao seu lado hoje! Continue sendo você mesmo(a) e logo encontrará uma conexão verdadeira."
            },
            {
                nome: "❤️ Muita Paixão",
                mensagem: "Prepare-se para sentimentos intensos! Algo que pode virar uma grande paixão está chegando até você."
            },
            {
                nome: "✨ Surpresa Boa",
                mensagem: "Uma surpresa agradável está a caminho! Pode ser um like, uma mensagem ou até um encontro inesperado."
            },
            {
                nome: "💞 Carinho e Afeto",
                mensagem: "Espalhe carinho! Seja gentil e atencioso(a), pois boas atitudes atraem pessoas com o mesmo coração."
            }
        ];

        let girando = false;

        function girarRoleta() {
            if (girando) return;
            girando = true;
            btnGirar.disabled = true;
            resultadoDiv.style.display = 'none';

            // Gira entre 5 e 8 voltas completas + ângulo aleatório
            const voltas = 5 * 360;
            const anguloFinal = Math.floor(Math.random() * 360);
            const rotacaoTotal = voltas + anguloFinal;

            roleta.style.transform = `rotate(${rotacaoTotal}deg)`;

            // Espera a animação terminar
            setTimeout(() => {
                // Calcula qual opção foi sorteada
                const anguloNormalizado = (360 - (anguloFinal % 360)) % 360;
                const indice = Math.floor(anguloNormalizado / 60);

                const escolhida = opcoes[indice];
                tituloResultado.textContent = escolhida.nome;
                textoResultado.textContent = escolhida.mensagem;

                resultadoDiv.style.display = 'block';
                btnGirar.disabled = false;
                girando = false;
            }, 4000); // Tempo igual ao da animação no CSS
        }
    </script>
</body>
</html>
